global:
  scrape_interval: 5s
  evaluation_interval: 5s
  scrape_timeout: 4s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: waito-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080
        labels:
          application: waito-api

  - job_name: mysql
    static_configs:
      - targets:
          - mysql-exporter:9104

  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: kafka
    static_configs:
      - targets:
          - kafka-exporter:9308

  - job_name: docker-stats
    static_configs:
      - targets:
          - docker-stats-exporter:9324
