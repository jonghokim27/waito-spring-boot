name: waito-infra

services:
  mysql:
    image: mysql:8.4
    container_name: waito-mysql
    command:
      - --performance-schema=ON
      - --slow-query-log=ON
      - --long-query-time=1
      - --log-output=TABLE
    environment:
      MYSQL_ROOT_PASSWORD: ${WAITO_MYSQL_PASSWORD}
      MYSQL_DATABASE: ${WAITO_MYSQL_DATABASE}
      TZ: ${WAITO_TIME_ZONE}
    ports:
      - "${WAITO_MYSQL_PORT}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - waito

  redis:
    image: redis:7.4-alpine
    container_name: waito-redis
    command: ["redis-server", "--appendonly", "no", "--latency-monitor-threshold", "100", "--save", '""']
    ports:
      - "${WAITO_REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - waito

  kafka-1:
    image: apache/kafka:3.9.0
    container_name: waito-kafka-1
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:${WAITO_KAFKA_1_PORT}"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-1:9092,EXTERNAL://${WAITO_KAFKA_EXTERNAL_HOST}:${WAITO_KAFKA_1_PORT}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: "24"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
      KAFKA_MIN_INSYNC_REPLICAS: "2"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    ports:
      - "${WAITO_KAFKA_1_PORT}:${WAITO_KAFKA_1_PORT}"
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - waito

  kafka-2:
    image: apache/kafka:3.9.0
    container_name: waito-kafka-2
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: "2"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:${WAITO_KAFKA_2_PORT}"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-2:9092,EXTERNAL://${WAITO_KAFKA_EXTERNAL_HOST}:${WAITO_KAFKA_2_PORT}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: "24"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
      KAFKA_MIN_INSYNC_REPLICAS: "2"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    ports:
      - "${WAITO_KAFKA_2_PORT}:${WAITO_KAFKA_2_PORT}"
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - waito

  kafka-3:
    image: apache/kafka:3.9.0
    container_name: waito-kafka-3
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: "3"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:${WAITO_KAFKA_3_PORT}"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-3:9092,EXTERNAL://${WAITO_KAFKA_EXTERNAL_HOST}:${WAITO_KAFKA_3_PORT}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: "24"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
      KAFKA_MIN_INSYNC_REPLICAS: "2"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    ports:
      - "${WAITO_KAFKA_3_PORT}:${WAITO_KAFKA_3_PORT}"
    volumes:
      - kafka-3-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - waito

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.8.0
    container_name: waito-kafka-exporter
    restart: unless-stopped
    command:
      - --kafka.server=kafka-1:9092
      - --kafka.server=kafka-2:9092
      - --kafka.server=kafka-3:9092
      - --topic.filter=.*
      - --group.filter=.*
    ports:
      - "9308:9308"
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    networks:
      - waito

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: waito-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: waito-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
    ports:
      - "18080:8080"
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    networks:
      - waito

  mysql-exporter:
    image: prom/mysqld-exporter:v0.16.0
    container_name: waito-mysql-exporter
    environment:
      MYSQLD_EXPORTER_PASSWORD: exporter_password
    command:
      - --mysqld.address=mysql:3306
      - --mysqld.username=exporter
      - --collect.info_schema.processlist
      - --collect.info_schema.innodb_metrics
      - --collect.global_status
      - --collect.global_variables
      - --collect.perf_schema.eventsstatements
      - --collect.perf_schema.file_events
      - --collect.perf_schema.tablelocks
    ports:
      - "9104:9104"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - waito

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: waito-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:${WAITO_REDIS_PORT}
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - waito

  docker-stats-exporter:
    build:
      context: ./docker-stats-exporter
    container_name: waito-docker-stats-exporter
    volumes:
      - ${WAITO_DOCKER_SOCKET}:/var/run/docker.sock
    network_mode: "host"

  waito-api:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        MODULE: waito-api
    container_name: waito-api
    env_file:
      - ../.env
    network_mode: "host"

  waito-consumer:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        MODULE: waito-consumer
    container_name: waito-consumer
    env_file:
      - ../.env
    network_mode: "host"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: waito-prometheus
    environment:
      WAITO_API_HOST: ${WAITO_API_HOST}
      WAITO_API_PORT: ${WAITO_API_PORT}
      WAITO_MYSQL_HOST: ${WAITO_MYSQL_HOST}
      WAITO_REDIS_HOST: ${WAITO_REDIS_HOST}
      WAITO_KAFKA_EXTERNAL_HOST: ${WAITO_KAFKA_EXTERNAL_HOST}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        sed \
          -e "s|__WAITO_API_HOST__|$${WAITO_API_HOST}|g" \
          -e "s|__WAITO_API_PORT__|$${WAITO_API_PORT}|g" \
          -e "s|__WAITO_MYSQL_HOST__|$${WAITO_MYSQL_HOST}|g" \
          -e "s|__WAITO_REDIS_HOST__|$${WAITO_REDIS_HOST}|g" \
          -e "s|__WAITO_KAFKA_EXTERNAL_HOST__|$${WAITO_KAFKA_EXTERNAL_HOST}|g" \
          /etc/prometheus/prometheus.yml.template > /tmp/prometheus.yml
        exec /bin/prometheus \
          --config.file=/tmp/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=15d \
          --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml.template:ro
      - prometheus-data:/prometheus
    network_mode: "host"

  grafana:
    image: grafana/grafana:11.3.1
    container_name: waito-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    network_mode: "host"

networks:
  waito:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:
  prometheus-data:
  grafana-data:
